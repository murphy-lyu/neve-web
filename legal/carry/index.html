<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carry — Legal</title>
    <style>
        :root {
            --fg: #1a1a1a;
            --fg-secondary: #555;
            --fg-tertiary: #888;
            --bg: #ffffff;
            --separator: #e5e5e5;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --fg: #f0f0f0;
                --fg-secondary: #b0b0b0;
                --fg-tertiary: #888;
                --bg: #1a1a1a;
                --separator: #333;
            }
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif;
            color: var(--fg);
            background: var(--bg);
            line-height: 1.7;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 480px; padding: 48px 24px; text-align: center; }
        h1 { font-size: 36px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 8px; }
        .tagline { font-size: 14px; color: var(--fg-tertiary); margin: 0 0 56px; }
        .links { display: flex; flex-direction: column; gap: 16px; }
        .link-group {
            border: 1px solid var(--separator);
            border-radius: 12px;
            padding: 20px 24px;
            text-align: left;
        }
        .link-group h2 {
            font-size: 13px;
            font-weight: 600;
            margin: 0 0 8px;
            color: var(--fg-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .link-group p { margin: 8px 0 0; font-size: 15px; }
        .link-group a {
            color: var(--fg);
            text-decoration: none;
            border-bottom: 1px solid var(--separator);
            padding-bottom: 1px;
        }
        .link-group a:hover { border-bottom-color: var(--fg); }
        .sep { color: var(--fg-tertiary); margin: 0 8px; }
        .footer { margin-top: 64px; font-size: 13px; color: var(--fg-tertiary); }
        .footer a { color: var(--fg-secondary); border-bottom: 1px solid var(--separator); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Carry</h1>
        <p class="tagline">Legal documents · 法律文件</p>

        <div class="links">
            <div class="link-group">
                <h2>Privacy Policy / 隐私政策</h2>
                <p>
                    <a href="privacy/">English</a>
                    <span class="sep">·</span>
                    <a href="privacy/zh.html">简体中文</a>
                </p>
            </div>

            <div class="link-group">
                <h2>Terms of Service / 服务条款</h2>
                <p>
                    <a href="terms/">English</a>
                    <span class="sep">·</span>
                    <a href="terms/zh.html">简体中文</a>
                </p>
            </div>
        </div>

        <div class="footer">
            Made by TIAN LYU · <a href="mailto:support@nevestudio.app">support@nevestudio.app</a>
        </div>
    </div>
</body>
</html>
